name: Feature Request / Execute Phase
description: Suggest an idea or propose the execution of a new phase lane.
title: "[LANE] Title"
labels: ["enhancement"]
body:
  - type: dropdown
    id: lane
    attributes:
      label: Execution Lane
      description: Which governance lane does this issue primarily belong to?
      options:
        - "Lane A — Contract Guardian (Truth)"
        - "Lane B — Citizen Experience"
        - "Lane C — Staff Operations"
        - "Lane D — Executive Visibility"
        - "Lane E — Verification"
    validations:
      required: true
  - type: textarea
    id: truth_impact
    attributes:
      label: Truth Registry Impact
      description: Does this change the truth boundaries, lifecycle, metrics, or public/internal rules? If so, what changes? (Lane A MUST approve first)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description & Scope
      description: Provide a clear description of what needs to be built or modified.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Browser/Runtime Verification Plan
      description: How will Lane E prove that this works according to the contract?
    validations:
      required: true
